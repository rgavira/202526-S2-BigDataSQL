# trino/conf/catalog/hive.properties
# Conector Hive → lee ficheros Parquet almacenados en MinIO (S3)

connector.name=hive

# Hive Metastore (Thrift)
hive.metastore.uri=thrift://hive-metastore:9083

# Activa el filesystem S3 nativo de Trino 400+ (necesario para que s3.* sean reconocidos)
fs.native-s3.enabled=true

# Configuración S3 / MinIO
s3.endpoint=http://minio:9000
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.path-style-access=true
s3.region=us-east-1

# Permite CREATE/DROP TABLE desde Trino
hive.non-managed-table-writes-enabled=true

# Lee columnas Parquet por nombre, no por posición
hive.parquet.use-column-names=true
